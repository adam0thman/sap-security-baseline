spec_version: "1.0"
id: db2
title: IBM Db2 for LUW under SAP — Security Baseline
product:
  key: DB2
  name: IBM Db2 for Linux, UNIX and Windows as the SAP NetWeaver database platform
  versions: ["10.5", "11.1", "11.5"]
version: "2026.07.1"
released: "2026-07-19"
supersedes: null
sources:
  - title: SAP NetWeaver AS ABAP Security Guide — Data Storage Security
    url: https://help.sap.com/doc/saphelp_nw73ehp1/7.31.19/en-us/4d/de53b3e9142e51e10000000a42189c/content.htm
    retrieved: "2026-07-19"

# SCOPE NOTE: this set covers the SAP-managed database surface — the OS-level accounts
# Db2 authenticates against, how the application server connects, and the network path
# between them. Engine-level hardening (authorities, LBAC, configuration parameters) is
# governed by IBM's own Db2 security documentation for the specific release. Verify
# against that guide and the applicable SAP Notes for your release before acting.
controls:
  - id: DB2-AUTHN-0001
    title: Database OS accounts are secured and non-interactive where possible
    category: authentication
    severity: critical
    rationale: >
      Db2 authenticates against operating-system accounts by default, so the instance
      owner and the SAP connect account are OS logins. Weak passwords or unnecessary
      interactive access on those accounts is direct access to the database.
    check:
      type: manual
      evidence_hint: >
        Listing of the Db2 instance owner, fenced user and SAP connect OS accounts, with
        their shell/interactive access and password policy.
    remediation: >
      Apply the OS password policy to these accounts, remove interactive logon where the
      account does not need it, and restrict who can switch to them.
    tags: [baseline, standard-users]

  - id: DB2-AUTHN-0002
    title: The SAP connect credential is held in the secure store
    category: authentication
    severity: critical
    rationale: >
      The application server authenticates on every start; a credential left readable in
      a profile or script hands the database to anyone with that OS access.
    check:
      type: manual
      evidence_hint: >
        Evidence the connect credential is held in the SAP secure store (SSFS) with
        restrictive permissions, and no plaintext copies in profiles or scripts.
    remediation: >
      Store the credential in the secure store, restrict its permissions to the SAP
      administrative OS users, and remove plaintext copies.
    tags: [baseline, credentials]

  - id: DB2-AUTHZ-0001
    title: Database authorities are granted narrowly
    category: authorization
    severity: high
    rationale: >
      Db2's high-level authorities confer sweeping control over the instance and its data.
      Granted to groups that accumulate members over time, they quietly become
      landscape-wide data access.
    check:
      type: manual
      evidence_hint: >
        Listing of holders of the administrative authorities (instance, database and
        security administration), each mapped to a named person or justified service.
    remediation: >
      Grant administrative authorities to named individuals rather than broad OS groups,
      and separate security administration from routine database administration.
    tags: [least-privilege, sod]

  - id: DB2-AUTHZ-0002
    title: The SAP schema owner is not used for interactive work
    category: authorization
    severity: high
    rationale: >
      The SAP schema owner has full rights over the business data. Interactive use removes
      attribution and risks direct changes that bypass the application's consistency and
      audit logic.
    check:
      type: manual
      evidence_hint: >
        Evidence DBAs use named accounts for interactive work rather than the SAP schema
        owner.
    remediation: >
      Give DBAs named accounts with the authorities they need and reserve the schema owner
      for the application connection.
    tags: [least-privilege, sod]

  - id: DB2-NET-0001
    title: The database is reachable only from the SAP application servers
    category: network
    severity: high
    rationale: >
      Direct network access to the Db2 port bypasses the SAP authorization layer entirely;
      anyone who can connect and authenticate reads the business data directly.
    check:
      type: manual
      evidence_hint: >
        Firewall rules showing the Db2 port reachable only from application servers and
        the DBA administration network.
    remediation: >
      Restrict the database port at the network layer to the application servers and the
      administration network.
    tags: [baseline, network]

  - id: DB2-NET-0002
    title: Client-to-database traffic is encrypted
    category: encryption
    severity: high
    rationale: >
      The connection between application server and database carries bulk business data
      and the credentials authorising it; unprotected, both are readable on that segment.
    check:
      type: manual
      evidence_hint: >
        SSL/TLS configuration for Db2 client connections, or evidence of a dedicated
        protected network segment.
    remediation: >
      Enable SSL for database connections with a properly issued certificate, or document
      the dedicated network segment relied upon instead.
    tags: [encryption, tls]

  - id: DB2-DATA-0001
    title: Data at rest and backups are protected
    category: data-storage
    severity: high
    rationale: >
      Database containers and backup images are complete copies of the business data with
      none of the application's access controls, and backups routinely leave the host.
    check:
      type: manual
      evidence_hint: >
        Evidence of native encryption or equivalent for data at rest, backup encryption,
        and access controls on the backup target.
    remediation: >
      Enable encryption at rest and backup encryption, hold the keys separately from the
      backups, and restrict access to the backup target.
    tags: [baseline, backup, encryption]

  - id: DB2-LOG-0001
    title: Database auditing records privileged activity
    category: logging-audit
    severity: medium
    rationale: >
      Activity performed directly against the database never reaches the SAP audit log, so
      without the Db2 audit facility, administrative access leaves no record.
    check:
      type: manual
      evidence_hint: >
        Audit policy configuration showing authentication and administrative actions are
        captured, with the audit output protected.
    remediation: >
      Configure the audit facility for authentication events and administrative actions,
      and route the output where DBAs cannot silently amend it.
    tags: [audit]

  - id: DB2-PATCH-0001
    title: Database fix packs are assessed and applied on a cadence
    category: patching
    severity: critical
    rationale: >
      Db2 fix packs carry security fixes, and SAP qualifies the levels supported under
      SAP. An unpatched database undermines every control in the layers above it.
    check:
      type: manual
      evidence_hint: >
        Current fix pack level with the applicable SAP Note confirming support for this
        SAP release.
    remediation: >
      Track the fix pack cadence, apply the levels SAP supports, and include the database
      in the monthly patch review.
    tags: [patching, patch-day]
