# NOTE: `sql_query` checks are read-only SELECTs against the SYS catalog; run them
# with a least-privileged monitoring user, never with SYSTEM.
controls:
  # ── Users & authentication ────────────────────────────────────────────────
  - id: HANA-AUTHN-0001
    title: The SYSTEM user is deactivated
    category: authentication
    severity: critical
    rationale: >
      SYSTEM is the initial superuser and holds irrevocable power over the database.
      SAP's own guidance is to create named administrator users with only the
      privileges they need and then deactivate SYSTEM, so that day-to-day work is
      attributable and no single shared credential controls the whole database.
    check:
      type: sql_query
      query: "SELECT USER_NAME FROM SYS.USERS WHERE USER_NAME = 'SYSTEM' AND USER_DEACTIVATED = 'FALSE'"
      assert: no_rows
    remediation: >
      Create named administrators with the required system privileges, verify they can
      perform all routine administration, then deactivate SYSTEM. Keep its password
      sealed for emergency reactivation.
    references:
      - label: SAP HANA Security Guide — Deactivate the SYSTEM User
    tags: [baseline, standard-users, quick-win]

  - id: HANA-AUTHN-0002
    title: Predefined database users are reviewed and secured
    category: authentication
    severity: high
    rationale: >
      A HANA installation creates a set of predefined technical users. Any left with an
      installation password, or active when the feature it serves is unused, is standing
      access to the database.
    check:
      type: manual
      evidence_hint: >
        SYS.USERS export showing predefined users, their active/deactivated state and
        last password change, with each active one mapped to a function in use.
    remediation: >
      Change installation passwords, deactivate the users whose components are not
      deployed, and record the remainder with their purpose.
    tags: [baseline, standard-users]

  - id: HANA-AUTHN-0003
    title: The password policy meets the customer's standard
    category: authentication
    severity: high
    rationale: >
      HANA's password policy is configured per system and governs every database user
      authenticated locally; the delivered defaults are not necessarily aligned with the
      customer's own policy.
    check:
      type: manual
      evidence_hint: >
        Password policy configuration (minimal length, complexity, lifetime, failed-logon
        lockout) compared against the customer's password standard.
    remediation: >
      Align the password policy parameters with the customer's standard, and maintain the
      password blacklist so obvious values are rejected.
    tags: [baseline, password-policy]

  # ── Authorization ─────────────────────────────────────────────────────────
  - id: HANA-AUTHZ-0001
    title: Powerful system privileges are tightly held
    category: authorization
    severity: critical
    rationale: >
      System privileges such as those granting data access administration, user
      administration or full catalog read defeat the object-level authorization model.
      Granted broadly, they let a holder reach any data in the database.
    check:
      type: manual
      evidence_hint: >
        Export of users and roles holding DATA ADMIN, USER ADMIN, ROLE ADMIN, CATALOG READ
        or similar system privileges, each with a named owner and justification.
    remediation: >
      Remove blanket system privileges from application and business roles, and restrict
      them to a small, reviewed set of named administrators.
    tags: [baseline, least-privilege]

  - id: HANA-AUTHZ-0002
    title: The PUBLIC role carries no sensitive privileges
    category: authorization
    severity: high
    rationale: >
      Every database user holds PUBLIC implicitly, so any privilege added to it is
      granted to everyone at once — including technical and application accounts that
      were never meant to read business data.
    check:
      type: manual
      evidence_hint: >
        List of privileges granted to PUBLIC, confirming none expose business schemas or
        administrative functions.
    remediation: >
      Revoke non-default privileges from PUBLIC and grant them through explicit roles
      instead.
    tags: [baseline, least-privilege, quick-win]

  - id: HANA-AUTHZ-0003
    title: Analytic privileges restrict access to sensitive views
    category: authorization
    severity: high
    rationale: >
      Object privileges control whether a view can be queried at all, not which rows it
      returns. Without analytic privileges, a user permitted to run a calculation view
      sees every row in it.
    check:
      type: manual
      evidence_hint: >
        List of views exposing restricted data together with the analytic privileges
        applied to them.
    remediation: >
      Define analytic privileges for views carrying personal, financial or otherwise
      restricted data, and assign them through roles rather than directly to users.
    tags: [least-privilege, data-protection]

  # ── Encryption ────────────────────────────────────────────────────────────
  - id: HANA-ENC-0001
    title: Data and log volume encryption is active
    category: encryption
    severity: high
    rationale: >
      Without volume encryption, anyone able to read the data or log files at the
      filesystem level — a storage administrator, a copied LUN, a stolen disk — reads
      the database contents without ever authenticating.
    check:
      type: sql_query
      query: "SELECT SCOPE FROM SYS.M_ENCRYPTION_OVERVIEW WHERE SCOPE IN ('PERSISTENCE','LOG') AND IS_ENCRYPTION_ACTIVE = 'FALSE'"
      assert: no_rows
    remediation: >
      Enable data volume and redo log encryption, and confirm the encryption root keys
      have been changed from their installation values.
    tags: [baseline, encryption, data-at-rest]

  - id: HANA-ENC-0002
    title: Backups are encrypted
    category: encryption
    severity: high
    rationale: >
      Backups leave the protected host by design and are frequently held on shared
      storage or shipped offsite. An unencrypted backup is a complete copy of the
      database available to anyone who can read the backup target.
    check:
      type: sql_query
      query: "SELECT SCOPE FROM SYS.M_ENCRYPTION_OVERVIEW WHERE SCOPE = 'BACKUP' AND IS_ENCRYPTION_ACTIVE = 'FALSE'"
      assert: no_rows
    remediation: >
      Enable backup encryption and verify that a restore from an encrypted backup has been
      tested end to end.
    tags: [baseline, encryption, backup]

  - id: HANA-ENC-0003
    title: Encryption root keys are changed and backed up separately
    category: encryption
    severity: critical
    rationale: >
      Encryption is only as good as its key management. Root keys left at installation
      values undermine the encryption entirely, while root keys backed up alongside the
      data they protect defeat the purpose and can also make recovery impossible if lost.
    check:
      type: manual
      evidence_hint: >
        Evidence that root keys were changed after installation and that a root key backup
        exists, stored separately from the data backups and protected by its own password.
    remediation: >
      Change the root keys after installation, back them up to a separate protected
      location, and document the recovery procedure.
    tags: [baseline, encryption, key-management]

  # ── Network ───────────────────────────────────────────────────────────────
  - id: HANA-NET-0001
    title: Client communication is TLS-protected
    category: encryption
    severity: high
    rationale: >
      JDBC and ODBC clients carry credentials and query results; unprotected, both are
      readable by anyone positioned on the network between client and database.
    check:
      type: manual
      evidence_hint: >
        Client connection configuration showing TLS enforced for JDBC/ODBC, with a valid
        server certificate and clients configured to validate it.
    remediation: >
      Enable and enforce TLS for client connections, install a proper server certificate,
      and require client-side validation.
    tags: [baseline, encryption, tls]

  - id: HANA-NET-0002
    title: Internal and inter-host communication is protected
    category: network
    severity: high
    rationale: >
      In distributed and replicated systems, the internal channels between hosts carry
      the same data as the client connections but are frequently left on an unsegmented
      network and unencrypted.
    check:
      type: manual
      evidence_hint: >
        Network configuration showing internal communication bound to a dedicated network
        and, where it crosses shared infrastructure, encrypted.
    remediation: >
      Place inter-host and system-replication traffic on a separate network and enable
      encryption where that traffic leaves trusted infrastructure.
    tags: [network, encryption]

  - id: HANA-NET-0003
    title: Tenant databases are isolated from one another
    category: system-management
    severity: high
    rationale: >
      In a multi-tenant system, tenants share an installation and operating-system
      footprint. Without isolation configured, a sufficiently privileged user in one
      tenant can reach data or files belonging to another.
    check:
      type: manual
      evidence_hint: >
        Configuration showing the intended database isolation level, with separate OS
        users per tenant where high isolation is required.
    remediation: >
      Configure the isolation level appropriate to whether tenants represent different
      trust domains, and restrict cross-database access explicitly.
    applies_to:
      environments: [PRD]
    tags: [multitenancy, isolation]

  # ── Auditing ──────────────────────────────────────────────────────────────
  - id: HANA-LOG-0001
    title: Database auditing is enabled
    category: logging-audit
    severity: high
    rationale: >
      Auditing is switched off by default. Without it there is no record of privileged
      activity, failed logons or privilege grants, so misuse of a database administrator
      account leaves no trace.
    check:
      type: sql_query
      query: "SELECT VALUE FROM SYS.M_INIFILE_CONTENTS WHERE SECTION = 'auditing configuration' AND KEY = 'global_auditing_state' AND UPPER(VALUE) <> 'TRUE'"
      assert: no_rows
    remediation: >
      Enable auditing, choose an appropriate audit trail target, and confirm the trail is
      protected from the administrators it audits.
    tags: [baseline, audit, monitoring]

  - id: HANA-LOG-0002
    title: Audit policies cover privileged and security-relevant actions
    category: logging-audit
    severity: medium
    rationale: >
      Auditing switched on without meaningful policies produces little of value; the
      actions that matter for an investigation are privilege grants, user changes,
      configuration changes and access to sensitive schemas.
    check:
      type: manual
      evidence_hint: >
        List of active audit policies showing coverage of user and role administration,
        privilege grants, configuration changes and sensitive data access.
    remediation: >
      Define audit policies for the security-relevant action set, and size retention so
      the trail outlasts realistic detection time.
    tags: [audit]

  # ── Files & patching ──────────────────────────────────────────────────────
  - id: HANA-SYS-0001
    title: Trace, dump and workload capture files are protected
    category: data-storage
    severity: medium
    rationale: >
      Traces, dumps and captured workloads can contain business data and credential
      material. They are written to the filesystem where OS-level access, not database
      authorization, decides who can read them.
    check:
      type: manual
      evidence_hint: >
        Filesystem permissions on the trace and dump directories, plus the retention and
        deletion practice for captured workload files.
    remediation: >
      Restrict OS access to the trace directories, avoid high trace levels in production,
      and delete captured workload files once they are no longer needed.
    tags: [data-storage]

  - id: HANA-PATCH-0001
    title: HANA revisions and security notes are assessed and applied
    category: patching
    severity: critical
    rationale: >
      The database holds the data every application layer protects; a defect fixed only
      by a revision leaves that data exposed no matter how well the application above it
      is configured.
    check:
      type: manual
      evidence_hint: >
        Patch Day comparison covering the current HANA revision with applicable HANA
        security notes and their status.
    remediation: >
      Track HANA revisions against the maintenance strategy and include HANA in the
      monthly Patch Day comparison.
    tags: [patching, patch-day]

  # ══════════════════════════════════════════════════════════════════════════
  # GCO / ECS mandatory hardening — SAP KBA 3480723 v5 (2026-04-21).
  # Set at DATABASE level. Parameters belong at SYSTEMDB level, not tenant level.
  # ══════════════════════════════════════════════════════════════════════════

  - id: HANA-AUTHN-0004
    title: Administrator-given passwords must be changed on first use
    category: authentication
    severity: high
    rationale: >
      A password set by an administrator is known to at least two people and usually
      travels through a ticket or a message. Forcing a change on first use bounds how
      long that shared value stays valid.
    check: {type: manual, evidence_hint: "force_first_password_change = true in the password policy."}
    remediation: Set force_first_password_change = true.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0005
    title: Password history prevents reuse
    category: authentication
    severity: medium
    rationale: >
      Without a sufficient history a user can rotate straight back to a known password,
      which nullifies expiry.
    check: {type: manual, evidence_hint: "last_used_passwords >= 15 (and never 0)."}
    remediation: Set last_used_passwords to at least 15.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0006
    title: Accounts lock after repeated invalid connect attempts
    category: authentication
    severity: high
    rationale: >
      The database accepts connections from the application tier and, too often, from
      administrative networks as well. Without a lock threshold those endpoints permit
      unlimited password guessing.
    check: {type: manual, evidence_hint: "maximum_invalid_connect_attempts <= 6 (and never 0)."}
    remediation: Set maximum_invalid_connect_attempts to 6 or fewer.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0007
    title: Locked accounts stay locked until an administrator intervenes
    category: authentication
    severity: high
    rationale: >
      A timed auto-unlock gives an attacker a renewed budget of attempts on a schedule
      and erases the signal that a lockout occurred.
    check: {type: manual, evidence_hint: "password_lock_time = -1 (locked until manually released)."}
    remediation: Set password_lock_time = -1.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0008
    title: The lockout policy also applies to the SYSTEM user
    category: authentication
    severity: high
    rationale: >
      Exempting SYSTEM from lockout leaves the single most powerful account in the
      database as the one place where unlimited password guessing is still possible.
    check: {type: manual, evidence_hint: "password_lock_for_system_user = true."}
    remediation: Set password_lock_for_system_user = true.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0009
    title: Minimum password length is enforced at the database
    category: authentication
    severity: high
    rationale: >
      Database accounts sit below the application's authorization model; a weak password
      here bypasses every control implemented above it.
    check: {type: manual, evidence_hint: "minimal_password_length >= 15."}
    remediation: >
      Set minimal_password_length to at least 15 (the GCO mandatory value). Existing
      passwords remain valid after an increase, so plan a rotation as well.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0010
    title: Password layout requires mixed character classes
    category: authentication
    severity: medium
    rationale: >
      Length alone is insufficient if the password can be a single character class;
      requiring several classes materially widens the search space.
    check: {type: manual, evidence_hint: "password_layout requiring characters from at least three of the four classes."}
    remediation: >
      Set password_layout so passwords must draw on at least three of upper case, lower
      case, numeric and special characters.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0011
    title: Password lifetimes are bounded
    category: authentication
    severity: medium
    rationale: >
      Unbounded lifetimes mean a leaked credential — including one in an old backup or
      handover document — remains valid indefinitely.
    check: {type: manual, evidence_hint: "maximum_password_lifetime <= 90, maximum_unused_initial_password_lifetime <= 7, maximum_unused_productive_password_lifetime <= 90, none set to 0."}
    remediation: >
      Set the productive lifetime to 90 days or fewer and the unused-initial lifetime to
      7 days or fewer. Ensure non-technical accounts are not set to never expire.
    tags: [password-policy, ecs-mandatory]

  - id: HANA-AUTHN-0012
    title: Connection errors do not disclose account state
    category: authentication
    severity: medium
    rationale: >
      Detailed connect errors reveal whether a user exists and whether it is locked or
      deactivated, which lets an attacker enumerate valid accounts before guessing.
    check: {type: manual, evidence_hint: "detailed_error_on_connect = false."}
    remediation: Set detailed_error_on_connect = false.
    tags: [ecs-mandatory, information-disclosure]

  - id: HANA-LOG-0003
    title: Auditing is enabled on both the system and tenant databases
    category: logging-audit
    severity: critical
    rationale: >
      Enabling auditing only on the tenants leaves the system database — where tenants
      are created, dropped and reconfigured — unaudited, and vice versa. Both layers
      need it for the trail to be complete.
    check: {type: manual, evidence_hint: "Auditing state enabled on SYSTEMDB and on every tenant database."}
    remediation: Enable auditing on the system database and on each tenant.
    tags: [audit, ecs-mandatory, critical-path]

  - id: HANA-LOG-0004
    title: The audit trail is written to syslog
    category: logging-audit
    severity: high
    rationale: >
      An audit trail held in a database table can be read and altered by the very
      administrators it is meant to hold accountable. Writing to syslog moves it beyond
      their reach and allows shipping to a separate system.
    check: {type: manual, evidence_hint: "Audit trail target configured to the syslog protocol rather than an internal table or CSV."}
    remediation: >
      Configure the audit trail target to syslog, and forward it to a log store the
      database administrators cannot amend.
    tags: [audit, ecs-mandatory]

  - id: HANA-LOG-0005
    title: Audit retention meets the mandated period
    category: logging-audit
    severity: medium
    rationale: >
      Incidents are routinely discovered months after the fact; a trail that rolls over
      first cannot answer the questions an investigation asks.
    check: {type: manual, evidence_hint: "Audit log retention configured to at least the mandated period (GCO standard: 201 days)."}
    remediation: Retain audit data for at least the mandated retention period.
    tags: [audit, ecs-mandatory]

  - id: HANA-LOG-0006
    title: A catch-all ALL ACTION audit policy is not in use
    category: logging-audit
    severity: medium
    rationale: >
      Auditing every action is not a stronger control — it degrades performance, can
      destabilise the system, and buries the events that matter in noise.
    check: {type: manual, evidence_hint: "Audit policy list showing no ALL ACTION policy enabled; customer policies follow the agreed naming convention."}
    remediation: >
      Replace any ALL ACTION policy with targeted policies for privileged and
      security-relevant actions, and follow the agreed naming convention.
    tags: [audit, ecs-mandatory]

  - id: HANA-NET-0004
    title: The minimum TLS protocol version is enforced
    category: encryption
    severity: high
    rationale: >
      Unless a floor is set, obsolete TLS versions stay negotiable and an otherwise
      encrypted connection can be downgraded to a breakable one.
    check: {type: manual, evidence_hint: "global.ini [communication] sslminprotocolversion set to TLS 1.2 or above, applied at SYSTEMDB level and not overridden at tenant level."}
    remediation: >
      Set the minimum protocol version in global.ini at system database level, and remove
      any conflicting tenant-level override.
    tags: [encryption, tls, ecs-mandatory]

  - id: HANA-NET-0005
    title: System replication traffic is encrypted and correctly bound
    category: encryption
    severity: high
    rationale: >
      Replication carries a continuous copy of the entire database between sites, often
      across data-centre boundaries. Unencrypted, it is the richest possible target on
      the network.
    check: {type: manual, evidence_hint: "global.ini [system_replication_communication] enable_ssl = on, with listeninterface set appropriately for a single- or multi-node topology."}
    remediation: >
      Enable SSL for system replication, bind the listen interface correctly for the
      topology, and secure both the metadata and data channels between sites.
    tags: [encryption, replication, ecs-mandatory]

  - id: HANA-ENC-0004
    title: Persistence encryption is active on current revisions
    category: encryption
    severity: high
    rationale: >
      Persistence encryption is enabled by default from SPS07 onward, but systems
      upgraded from earlier revisions do not gain it retroactively, so the assumption
      that "it is on by default" can be wrong on exactly the older systems that need it.
    check: {type: manual, evidence_hint: "Encryption status for data volumes, redo logs and backups, with the revision level noted."}
    remediation: >
      Verify data volume, redo log and backup encryption are active rather than assuming
      the installation default, and enable them where an upgraded system lacks them.
    tags: [encryption, ecs-mandatory]
