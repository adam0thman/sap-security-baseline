spec_version: "1.3"
id: hana
title: SAP HANA Platform — Security Baseline
product:
  key: HANA
  name: SAP HANA Platform (database)
  versions: ["2.0 SPS04", "2.0 SPS05", "2.0 SPS06+"]
version: "2026.07.2"
released: "2026-07-19"
supersedes: "2026.07.1"
sources:
