# NOTE: AS Java has no ABAP-style instance profile. Its equivalents are UME
# properties and VM/service parameters, expressed here as `ume_property` checks
# (introduced in spec_version 1.1).
controls:
  # ── Authentication / standard users ───────────────────────────────────────
  - id: JAVA-AUTHN-0001
    title: The SAP* emergency user is not left active
    category: authentication
    severity: critical
    rationale: >
      SAP* on AS Java is an emergency account with full administrative rights,
      intended only for repairing a broken UME configuration. While it is active,
      users from the regular user stores cannot log on and the system is effectively
      governed by one all-powerful local account.
    check:
      type: ume_property
      property: ume.superadmin.activated
      operator: eq
      value: "false"
    remediation: >
      Deactivate the emergency user once UME is healthy, and set a strong password
      for it so that a future activation is not trivially guessable.
    tags: [baseline, standard-users, quick-win]

  - id: JAVA-AUTHN-0002
    title: Standard users no longer carry their installation passwords
    category: authentication
    severity: critical
    rationale: >
      AS Java creates a set of standard accounts at installation — the Administrator,
      the Guest user, and the communication users. Any still holding its initial
      password is a direct route to administrative control of the engine.
    check:
      type: manual
      evidence_hint: >
        UME user list showing password-change dates for the Administrator
        (J2EE_ADM_<SID>), Guest (J2EE_GST_<SID>), SAPJSF_<SID>, SAP<SID>DB, ADSuser
        and caf_mp_scvuser where present.
    remediation: >
      Change every standard user's password through UME administration, record them
      in a credential vault, and update the secure store and any dependent
      configuration (JMS, data sources) with the new values.
    tags: [baseline, standard-users, quick-win]

  - id: JAVA-AUTHN-0003
    title: The Guest user remains locked unless anonymous access is required
    category: authentication
    severity: high
    rationale: >
      The Guest account exists to serve anonymous access and ships locked. Unlocking
      it without a documented need exposes whatever applications permit anonymous
      logon to anyone who can reach the engine.
    check:
      type: manual
      evidence_hint: >
        UME showing the Guest user (J2EE_GST_<SID>) locked, or documented
        justification plus the restricted role set if anonymous access is genuinely needed.
    remediation: >
      Keep Guest locked. Where anonymous access is required for a specific
      application, scope its roles to that application only.
    tags: [baseline, standard-users]

  - id: JAVA-AUTHN-0004
    title: UME enforces a minimum password length
    category: authentication
    severity: high
    rationale: >
      The UME security policy is the only central control over password strength for
      users held in the Java user store; left at a permissive default it undermines
      every account the engine authenticates locally.
    check:
      type: ume_property
      property: ume.logon.security_policy.password_min_length
      operator: gte
      value: 30
    remediation: >
      SAP's elevated ECS standard for the Default security policy is 30. Customers are
      advised to define their own policy profiles (for example CUSTOMER_MANAGED_USER and
      CUSTOMER_MANAGED_TECH_USER) rather than relying on Default; where Default is used,
      the elevated values are mandatory. On-premise deployments should meet their own
      policy, with 15+ a reasonable floor.
    tags: [baseline, password-policy]

  - id: JAVA-AUTHN-0005
    title: Accounts lock after repeated failed logons
    category: authentication
    severity: high
    rationale: >
      Without a lockout threshold the Java logon endpoints — which are frequently the
      internet-facing part of the landscape — permit unlimited password guessing.
    check:
      type: ume_property
      property: ume.logon.security_policy.lock_after_invalid_attempts
      operator: lte
      value: 3
    remediation: >
      Set the lockout threshold to 3 or fewer failed attempts (the ECS value) and agree
      an unlock process with the service desk.
    tags: [baseline, password-policy]

  # ── Authorization ─────────────────────────────────────────────────────────
  - id: JAVA-AUTHZ-0001
    title: Administrative roles are held by named individuals only
    category: authorization
    severity: high
    rationale: >
      Membership of the Administrators group confers unlimited control of the engine,
      including deployment of arbitrary code. Shared or generously-granted admin
      access removes both accountability and any meaningful segregation of duties.
    check:
      type: manual
      evidence_hint: >
        UME export of the Administrators group and any role granting the
        Administrator action set, with each member mapped to a named person.
    remediation: >
      Reduce administrative membership to named administrators, remove shared
      accounts, and review the list on a defined cadence.
    tags: [baseline, sod]

  - id: JAVA-AUTHZ-0002
    title: UME roles are built from J2EE actions rather than blanket assignments
    category: authorization
    severity: medium
    rationale: >
      Assigning broad predefined roles instead of composing the specific actions an
      application needs grants far more than the task requires and is difficult to
      audit later.
    check:
      type: manual
      evidence_hint: >
        Role definitions showing action-level composition for the business roles in
        use, rather than direct assignment of wide administrative roles.
    remediation: >
      Compose UME roles from the specific J2EE actions each application requires and
      retire over-broad role assignments.
    tags: [authorization]

  # ── Network / administration surface ──────────────────────────────────────
  - id: JAVA-NET-0001
    title: Administrative protocols are not reachable from user networks
    category: network
    severity: critical
    rationale: >
      The P4 (RMI/JMX) and telnet administration interfaces allow configuration
      changes and deployment. Exposed beyond an administrative network — and P4 in
      its unencrypted form — they are a direct path to full engine control.
    check:
      type: manual
      evidence_hint: >
        Firewall or port-scan evidence showing the P4 and telnet administration ports
        reachable only from the administration network, with P4 secured (P4S) where used.
    remediation: >
      Restrict the administration ports at the network layer, use the SSL-secured P4
      variant for remote administration, and disable telnet administration where it is
      not required.
    tags: [baseline, network, quick-win]

  - id: JAVA-NET-0002
    title: HTTP access to the engine is TLS-protected
    category: encryption
    severity: high
    rationale: >
      AS Java frequently fronts browser-facing applications; without TLS the logon
      credentials and session identifiers of every user are exposed on the wire.
    check:
      type: manual
      evidence_hint: >
        ICM/Web Dispatcher configuration showing TLS enabled with a valid certificate,
        and the plain HTTP port either disabled or redirecting.
    remediation: >
      Configure TLS on the ICM or the Web Dispatcher in front of it, install a
      certificate from a trusted CA, and disable or redirect plain HTTP.
    tags: [baseline, encryption, tls]

  - id: JAVA-WEB-0001
    title: Unused Java applications and aliases are undeployed or restricted
    category: web-http
    severity: medium
    rationale: >
      A default AS Java installation exposes administrative and example applications
      that most customers never use; each one is reachable attack surface carrying its
      own patch burden.
    check:
      type: manual
      evidence_hint: >
        List of deployed applications and their aliases, with the ones actually in use
        documented and the remainder undeployed or access-restricted.
    remediation: >
      Undeploy applications with no business owner; where an application must remain,
      restrict it by role and by network path.
    tags: [attack-surface]

  # ── Logging ───────────────────────────────────────────────────────────────
  - id: JAVA-LOG-0001
    title: Security audit logging is enabled and retained
    category: logging-audit
    severity: high
    rationale: >
      Without the Java security audit log there is no record of logon attempts, role
      changes or deployments, so neither misuse nor a successful intrusion can be
      reconstructed afterwards.
    check:
      type: manual
      evidence_hint: >
        Log configuration showing the security audit log active, with retention and
        an offload or archiving arrangement matching the agreed period.
    remediation: >
      Enable security audit logging, size retention to the agreed period, and include
      the log in the regular operations review.
    tags: [baseline, audit, monitoring]

  # ── Patching ──────────────────────────────────────────────────────────────
  - id: JAVA-PATCH-0001
    title: AS Java components are covered by the Patch Day review
    category: patching
    severity: critical
    rationale: >
      Java stack components have carried remotely-exploitable notes affecting
      internet-facing services; because Java systems are more often externally
      reachable, unpatched defects here are disproportionately dangerous.
    check:
      type: manual
      evidence_hint: >
        Patch Day comparison output covering the Java component levels, with
        applicable notes and their implementation status.
    remediation: >
      Include the Java stack in the monthly Patch Day comparison and prioritise
      HotNews affecting externally-reachable services.
    tags: [patching, patch-day]

  # ══════════════════════════════════════════════════════════════════════════
  # ECS / RISE mandatory hardening — SAP Note 3381209 v9 (2026-04-09).
  # ══════════════════════════════════════════════════════════════════════════

  - id: JAVA-WEB-0002
    title: The invoker servlet is disabled globally
    category: web-http
    severity: critical
    rationale: >
      The generic invoker servlet allows arbitrary servlets to be addressed directly by
      class name, bypassing the declared URL mappings and their security constraints.
      It is a long-standing and heavily exploited remote-access path on AS Java.
    check: {type: ume_property, property: EnableInvokerServletGlobally, operator: eq, value: "FALSE"}
    remediation: Set EnableInvokerServletGlobally = FALSE.
    references:
      - sap_note: "1445998"
        label: Disabling the invoker servlet
    tags: [ecs-mandatory, critical-path, quick-win]

  - id: JAVA-AUTHN-0006
    title: Passwords expire on a defined interval
    category: authentication
    severity: medium
    rationale: >
      Without expiry a leaked Java credential stays valid indefinitely, and Java systems
      are more often internet-facing than the ABAP stack.
    check: {type: ume_property, property: ume.logon.security_policy.password_expire_days, operator: lte, value: 90}
    remediation: Set password expiry to 90 days or fewer.
    tags: [password-policy, ecs-mandatory]

  - id: JAVA-AUTHN-0007
    title: Password history prevents reuse
    category: authentication
    severity: medium
    rationale: >
      A short history lets a user cycle straight back to a previous password, which
      cancels out the benefit of forced rotation.
    check: {type: ume_property, property: ume.logon.security_policy.password_history, operator: gte, value: 15}
    remediation: Set the password history to at least 15.
    tags: [password-policy, ecs-mandatory]

  - id: JAVA-AUTHN-0008
    title: The logon policy is enforced at logon
    category: authentication
    severity: medium
    rationale: >
      A tightened policy only affects new passwords unless it is enforced at logon, so
      accounts can persist indefinitely on credentials that predate the current rules.
    check: {type: ume_property, property: ume.logon.security_policy.enforce_policy_at_logon, operator: eq, value: "true"}
    remediation: Set enforce_policy_at_logon = true.
    tags: [password-policy, ecs-mandatory]

  - id: JAVA-AUTHN-0009
    title: Locked accounts are not unlocked automatically
    category: authentication
    severity: high
    rationale: >
      Automatic unlocking after a timeout gives an attacker a renewed budget of guesses
      and removes the operational signal that a lockout happened.
    check: {type: ume_property, property: ume.logon.security_policy.auto_unlock_time, operator: eq, value: 0}
    remediation: Set auto_unlock_time = 0 so unlocking requires deliberate action.
    tags: [password-policy, ecs-mandatory, quick-win]

  - id: JAVA-AUTHN-0010
    title: Password composition requires mixed case, alphanumerics and specials
    category: authentication
    severity: medium
    rationale: >
      Composition rules stop long passwords collapsing onto predictable single-class
      strings, which is what keeps them resistant to offline cracking.
    check: {type: ume_property, property: ume.logon.security_policy.password_special_char_required, operator: gte, value: 1}
    remediation: >
      Require at least one special character, one alphanumeric and mixed case
      (password_special_char_required, password_alpha_numeric_required and
      password_mix_case_required all set to 1).
    tags: [password-policy, ecs-mandatory]

  - id: JAVA-AUTHN-0011
    title: The old password cannot form part of the new one
    category: authentication
    severity: medium
    rationale: >
      Allowing the previous password as a substring reduces a rotation to appending a
      character, which is barely a change at all.
    check: {type: ume_property, property: ume.logon.security_policy.oldpass_in_newpass_allowed, operator: eq, value: "FALSE"}
    remediation: Set oldpass_in_newpass_allowed = FALSE.
    tags: [password-policy, ecs-mandatory]

  - id: JAVA-AUTHN-0012
    title: Automatic logon with a stored user password is disabled
    category: authentication
    severity: high
    rationale: >
      Automatic logon weakens the anti-XSRF salt mechanism on the logon page; with it
      off, the system always checks the salt parameter in the logon request.
    check: {type: ume_property, property: ume.userpwd_automatic_logon, operator: eq, value: "FALSE"}
    remediation: Set ume.userpwd_automatic_logon = FALSE.
    tags: [ecs-mandatory, session]

  - id: JAVA-SESS-0001
    title: The logon ticket is marked as a secure cookie
    category: session
    severity: high
    rationale: >
      Without the secure flag the browser will send the logon ticket over plain HTTP,
      exposing a bearer credential to anyone observing the network.
    check: {type: ume_property, property: ume.logon.enforce_secure_cookie, operator: eq, value: "TRUE"}
    remediation: Set ume.logon.enforce_secure_cookie = TRUE.
    tags: [ecs-mandatory, session, quick-win]

  - id: JAVA-SESS-0002
    title: The logon ticket is marked HttpOnly
    category: session
    severity: high
    rationale: >
      HttpOnly prevents client-side script from reading the ticket, which is what turns
      a cross-site scripting flaw into a full session takeover.
    check: {type: ume_property, property: ume.logon.httponlycookie, operator: eq, value: "TRUE"}
    remediation: Set ume.logon.httponlycookie = TRUE.
    tags: [ecs-mandatory, session, quick-win]

  - id: JAVA-SESS-0003
    title: The logon ticket domain is not relaxed
    category: session
    severity: high
    rationale: >
      Relaxing the domain widens the set of hosts the ticket is sent to, so any less
      trustworthy application in a sibling subdomain can receive it.
    check: {type: ume_property, property: ume.logon.security.relax_domain.level, operator: eq, value: 0}
    remediation: Set ume.logon.security.relax_domain.level = 0.
    tags: [ecs-mandatory, session]

  - id: JAVA-LOG-0002
    title: The security audit log records the acting user and client address
    category: logging-audit
    severity: medium
    rationale: >
      An audit entry without the actor and the source address records that something
      happened but not who did it or from where, which is of little use in an investigation.
    check: {type: ume_property, property: ume.secaudit.log_actor, operator: eq, value: "TRUE"}
    remediation: >
      Set ume.secaudit.log_actor = TRUE and
      ume.logon.security_policy.log_client_hostaddress = TRUE.
    tags: [audit, ecs-mandatory]

  - id: JAVA-WEB-0003
    title: Invalid HTTP host headers are rejected
    category: web-http
    severity: high
    rationale: >
      Accepting an arbitrary Host header enables host-header injection, which can
      poison generated links, caches and password-reset URLs.
    check: {type: ume_property, property: icm/HTTP/allow_invalid_host_header, operator: eq, value: "FALSE"}
    remediation: Set icm/HTTP/allow_invalid_host_header = FALSE.
    tags: [ecs-mandatory]

  - id: JAVA-WEB-0004
    title: HTTP error pages and headers do not disclose system detail
    category: web-http
    severity: medium
    rationale: >
      Verbose errors and server headers reveal product, version and internal paths — the
      reconnaissance an attacker needs to select a working exploit.
    check: {type: ume_property, property: is/HTTP/show_detailed_errors, operator: eq, value: "FALSE"}
    remediation: >
      Set is/HTTP/show_detailed_errors = FALSE and is/HTTP/show_server_header = FALSE.
    tags: [ecs-mandatory, information-disclosure]

  - id: JAVA-WEB-0005
    title: Protected web methods are restricted
    category: web-http
    severity: high
    rationale: >
      The management web methods expose process lists, parameters, log files and the
      alert tree; unprotected they hand out detailed internals without authentication.
    check:
      type: manual
      evidence_hint: >
        service/protectedwebmethods set to the ECS value, protecting the process list,
        parameter, log file and access point methods.
    remediation: Set service/protectedwebmethods to the ECS-specified protected set.
    tags: [ecs-mandatory]

  - id: JAVA-NET-0003
    title: The telnet administration port is not exposed
    category: network
    severity: critical
    rationale: >
      Telnet administration is unencrypted and grants configuration control. In the ECS
      standard it is bound to localhost with the port disabled, rather than being
      reachable across the network.
    check:
      type: manual
      evidence_hint: >
        ICM server port configuration showing the telnet port disabled or bound to
        localhost only.
    remediation: >
      Disable the telnet port or bind it to localhost, and administer through the
      SSL-protected paths instead.
    tags: [ecs-mandatory, network, critical-path]

  - id: JAVA-NET-0004
    title: TLS is restricted to current protocol versions and cipher suites
    category: encryption
    severity: high
    rationale: >
      Legacy TLS versions and weak suites stay negotiable unless explicitly removed, so
      an otherwise-encrypted session can be downgraded to a breakable one.
    check:
      type: manual
      evidence_hint: >
        ssl/ciphersuites and ssl/client_ciphersuites set to SAP's recommended strings for
        TLS 1.2/1.3, with SNI enabled on client and ICM.
    remediation: >
      Use SAP's recommended cipher suite strings rather than hand-assembled ones, and
      confirm kernel and CommonCryptoLib versions support them.
    references:
      - sap_note: "3318423"
      - sap_note: "3346659"
    tags: [encryption, tls, ecs-mandatory]

  - id: JAVA-NET-0005
    title: Client certificate verification is enabled on HTTPS
    category: encryption
    severity: medium
    rationale: >
      Where the deployment relies on client certificates, the server must actually
      request and verify one, otherwise the control is decorative.
    check: {type: ume_property, property: icm/HTTPS/verify_client, operator: eq, value: 1}
    remediation: Set icm/HTTPS/verify_client = 1.
    tags: [ecs-mandatory, tls]

  - id: JAVA-RFC-0001
    title: Gateway ACLs and enforcement are configured on the Java stack
    category: interface-rfc
    severity: critical
    rationale: >
      The Java stack runs its own gateway with the same exposure as the ABAP one: without
      ACL files and enforcement, external programs can be started or registered against it.
    check: {type: ume_property, property: gw/acl_mode, operator: eq, value: 1}
    remediation: >
      Set gw/acl_mode = 1 and gw/reg_no_conn_info = 255, and point gw/sec_info,
      gw/reg_info and gw/prxy_info at maintained, wildcard-free ACL files.
    tags: [gateway, ecs-mandatory, critical-path]

  - id: JAVA-NET-0006
    title: The message server is not externally monitorable
    category: network
    severity: medium
    rationale: >
      External monitoring access to the message server discloses internal landscape
      information to anything that can reach the port.
    check: {type: ume_property, property: ms/monitor, operator: eq, value: 0}
    remediation: Set ms/monitor = 0 and point ms/acl_info at a maintained ACL file.
    tags: [message-server, ecs-mandatory]
