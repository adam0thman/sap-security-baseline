spec_version: "1.0"
id: solman
title: SAP Solution Manager — Security Baseline
product:
  key: SOLMAN
  name: SAP Solution Manager 7.2
  versions: ["7.2 SPS06+", "7.2 SPS17", "7.2 SPS21"]
version: "2026.07.1"
released: "2026-07-19"
supersedes: null
sources:
  - title: Secure Configuration Guide — SAP Solution Manager 7.2
    url: https://help.sap.com/doc/b4a8c8e4d575476ba67bdbf69a904b24/7.2.17/en-US/SecConfigGuide.pdf
    retrieved: "2026-07-19"
  - title: Security Optimization Guide — SAP Solution Manager 7.2
    url: https://help.sap.com/doc/d8da69fe121747ae9c641beba04681ba/7.2.21/en-US/SecOptGuide.pdf
    retrieved: "2026-07-19"
  - title: Security Guide for SAP Solution Manager 7.2 — Authorization Concept
    url: https://help.sap.com/doc/e22a0fb5649f47a5ab6e858afed5728c/7.2.03/en-US/Authorization_Concept_Security_Guide_72_SPS_3E.PDF
    retrieved: "2026-07-19"

# NOTE: Solution Manager runs on AS ABAP, so nw-as-abap.yaml applies in addition.
# Its defining risk is concentration: SolMan holds privileged connections into every
# managed system in the landscape, so a compromise here is a compromise everywhere.
controls:
  - id: SOLMAN-RFC-0001
    title: Managed-system RFC users are least-privileged
    category: interface-rfc
    severity: critical
    rationale: >
      Solution Manager reaches into every managed system through generated RFC users. If
      those users carry blanket authorizations, then a single compromise of Solution
      Manager yields privileged access to the entire landscape, production included.
    check:
      type: manual
      evidence_hint: >
        User master export from a sample of managed systems showing the SolMan-generated
        RFC users, their assigned roles, and confirmation that none holds SAP_ALL or
        SAP_NEW.
    remediation: >
      Use the roles generated by the guided setup rather than blanket profiles, remove
      SAP_ALL/SAP_NEW from the connection users, and re-check after each managed-system
      setup run.
    tags: [baseline, rfc, landscape, critical-path]

  - id: SOLMAN-RFC-0002
    title: Trusted RFC into managed systems is scoped, not open
    category: interface-rfc
    severity: critical
    rationale: >
      Trusted relationships let Solution Manager log on to a managed system without a
      password. Granted with a wildcard user in S_RFCACL, that becomes the ability to act
      as any user — including emergency and administrative accounts — in production.
    check:
      type: manual
      evidence_hint: >
        S_RFCACL definitions in managed systems showing explicit calling system, client
        and user scoping, with no wildcard in the user field.
    remediation: >
      Scope S_RFCACL to the Solution Manager system and specific technical users; never
      grant it with a wildcard user, and never to dialog users.
    tags: [baseline, trusted-rfc, critical-path]

  - id: SOLMAN-AUTHZ-0001
    title: Blanket authorization profiles are not assigned in Solution Manager
    category: authorization
    severity: critical
    rationale: >
      Because Solution Manager is a gateway into every other system, standing SAP_ALL or
      SAP_NEW here is materially worse than in a single application system — it converts
      one over-privileged account into landscape-wide reach.
    check:
      type: user_query
      criterion: type_dialog_with_sap_all
      assert: no_rows
    remediation: >
      Remove SAP_ALL/SAP_NEW from dialog users, replace with the role set from the guided
      setup, and route emergency access through a controlled firefighter process.
    tags: [baseline, sod, quick-win]

  - id: SOLMAN-AUTHN-0001
    title: Technical and standard SolMan users are secured
    category: authentication
    severity: high
    rationale: >
      The setup process creates a set of technical and administrative accounts whose
      credentials are frequently shared among the Basis team and rarely rotated, despite
      their reach across the landscape.
    check:
      type: manual
      evidence_hint: >
        List of SolMan administrative and technical users with type, lock status and last
        password change, and confirmation their credentials are vaulted rather than shared.
    remediation: >
      Keep technical users as communication type, rotate their passwords into a vault,
      and give administrators named dialog accounts instead of sharing one.
    tags: [standard-users]

  - id: SOLMAN-AGENT-0001
    title: Diagnostics Agent connections are authenticated and restricted
    category: interface-rfc
    severity: high
    rationale: >
      Diagnostics Agents run on every managed host and report into Solution Manager. An
      unauthenticated or over-trusted agent channel is a foothold on the managed hosts
      themselves, below the application layer.
    check:
      type: manual
      evidence_hint: >
        Agent connection configuration showing authenticated registration and the network
        path over which agents connect.
    remediation: >
      Require authenticated agent registration, restrict the agent network path, and
      remove agents for hosts no longer in the landscape.
    tags: [agents, network]

  - id: SOLMAN-NET-0001
    title: Solution Manager is network-segmented as a high-value system
    category: network
    severity: high
    rationale: >
      Solution Manager is one of the few systems holding privileged credentials for
      production. Treating it as a routine internal tool, reachable from general user
      networks, misjudges what an attacker gains by reaching it.
    check:
      type: manual
      evidence_hint: >
        Network diagram or firewall rules showing which networks can reach the Solution
        Manager application and administration ports.
    remediation: >
      Restrict access to administrative networks and the specific paths managed systems
      need, and treat it with production-grade change control regardless of its own SID.
    tags: [network, landscape]

  - id: SOLMAN-DATA-0001
    title: Data collected from managed systems is protected
    category: data-storage
    severity: high
    rationale: >
      Solution Manager aggregates traces, dumps, EarlyWatch reports and configuration
      extracts from across the landscape. That store describes every system's weaknesses
      in one place and often contains business data captured in traces.
    check:
      type: manual
      evidence_hint: >
        Authorization review showing who can read collected reports, traces and
        configuration stores, plus retention practice for that data.
    remediation: >
      Restrict access to collected diagnostics to those who need it, and apply a retention
      period rather than accumulating indefinitely.
    tags: [data-protection]

  - id: SOLMAN-WEB-0001
    title: Only required Solution Manager web services are active
    category: web-http
    severity: medium
    rationale: >
      Solution Manager activates a broad set of ICF services during setup to support its
      many scenarios, most of which a given customer never uses.
    check:
      type: manual
      evidence_hint: >
        SICF export showing active services mapped to the scenarios actually configured
        in the guided setup.
    remediation: >
      Deactivate services belonging to scenarios that are not in use, and re-review after
      each guided setup run.
    tags: [icf, attack-surface]

  - id: SOLMAN-LOG-0001
    title: Privileged activity in Solution Manager is audited
    category: logging-audit
    severity: high
    rationale: >
      Given its reach, use of Solution Manager's trusted connections is exactly the
      activity most worth recording — and the activity an intruder would most want
      unlogged.
    check:
      type: profile_parameter
      parameter: rsau/enable
      operator: eq
      value: 1
    remediation: >
      Enable the Security Audit Log with filters covering RFC calls, logons and
      administrative transactions, and review it as part of operations.
    tags: [audit, monitoring]

  - id: SOLMAN-PATCH-0001
    title: Solution Manager is covered by the Patch Day review
    category: patching
    severity: critical
    rationale: >
      A system holding privileged access to the whole landscape must not lag on patches;
      it is a high-value target precisely because of what it can reach.
    check:
      type: manual
      evidence_hint: >
        Patch Day comparison covering the Solution Manager component levels with
        applicable notes and their status.
    remediation: >
      Include Solution Manager in the monthly Patch Day comparison and prioritise its
      HotNews alongside production systems.
    tags: [patching, patch-day]
